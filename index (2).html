<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do you miss me, babe? 🖤</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink:    #ff3d7f;
      --pink2:   #ff6fa3;
      --dark:    #0d0d0d;
      --dark2:   #1a1a1a;
      --dark3:   #222222;
      --card:    rgba(26,26,26,0.95);
      --muted:   #888;
      --border:  rgba(255,61,127,0.18);
      --glow:    0 0 40px rgba(255,61,127,0.25);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Dark mesh background */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(255,61,127,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 80%, rgba(255,61,127,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 50% 50%, rgba(20,20,20,1) 0%, #0d0d0d 100%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      from { filter: brightness(1); }
      to   { filter: brightness(1.08); }
    }

    /* Grid lines subtle */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,61,127,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,61,127,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Particles */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .p {
      position: absolute; bottom: -60px;
      animation: rise linear infinite; opacity: 0;
    }
    @keyframes rise {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
      8%   { opacity: 0.3; }
      92%  { opacity: 0.08; }
      100% { transform: translateY(-115vh) rotate(540deg); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative; z-index: 10;
      background: var(--card);
      backdrop-filter: blur(24px);
      border-radius: 32px;
      padding: 2.6rem 3rem 2.4rem;
      max-width: 460px; width: 92%;
      text-align: center;
      box-shadow:
        0 0 0 1px var(--border),
        0 32px 80px rgba(0,0,0,0.6),
        var(--glow);
      animation: cardIn 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(50px) scale(0.87); }
      to   { opacity: 1; transform: none; }
    }

    /* Music pill */
    .music-pill {
      display: inline-flex; align-items: center; gap: 0.55rem;
      background: rgba(255,61,127,0.08);
      border: 1px solid rgba(255,61,127,0.2);
      border-radius: 50px;
      padding: 0.4rem 1rem 0.4rem 0.5rem;
      margin-bottom: 1.6rem;
      animation: fadeDown 0.6s 0.4s ease both; opacity: 0;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: none; }
    }
    .music-pill button {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--pink), #c2185b);
      border: none; border-radius: 50%; cursor: pointer;
      color: white; font-size: 0.65rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(255,61,127,0.5);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .music-pill button:hover { transform: scale(1.12); }
    .pill-label {
      font-size: 0.7rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--pink2); font-weight: 500;
    }
    .bars { display: flex; align-items: flex-end; gap: 2px; height: 13px; }
    .bars span {
      display: block; width: 3px;
      background: linear-gradient(to top, var(--pink), var(--pink2));
      border-radius: 2px;
      animation: barBounce 0.9s ease-in-out infinite alternate;
      transition: height 0.3s;
    }
    .bars span:nth-child(1) { height: 5px;  animation-delay: 0s; }
    .bars span:nth-child(2) { height: 11px; animation-delay: 0.18s; }
    .bars span:nth-child(3) { height: 8px;  animation-delay: 0.32s; }
    .bars span:nth-child(4) { height: 13px; animation-delay: 0.12s; }
    .bars span:nth-child(5) { height: 6px;  animation-delay: 0.28s; }
    @keyframes barBounce {
      from { transform: scaleY(0.3); }
      to   { transform: scaleY(1); }
    }
    .bars.paused span { animation-play-state: paused; height: 3px !important; }

    /* Hero emoji */
    .hero-emoji {
      font-size: 5.5rem; line-height: 1; display: block;
      margin-bottom: 1.1rem;
      animation: wobble 2.6s ease-in-out infinite, fadeDown 0.7s 0.25s ease both;
      opacity: 0;
      filter: drop-shadow(0 0 20px rgba(255,61,127,0.4));
    }
    @keyframes wobble {
      0%,100% { transform: scale(1) rotate(0deg); }
      35%      { transform: scale(1.09) rotate(-5deg); }
      65%      { transform: scale(1.09) rotate(5deg); }
    }

    /* Typography */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.7rem; font-weight: 600;
      color: #ffffff; line-height: 1.15;
      margin-bottom: 0.4rem;
      animation: fadeDown 0.7s 0.35s ease both; opacity: 0;
      text-shadow: 0 0 40px rgba(255,61,127,0.3);
    }
    h1 em { font-style: italic; color: var(--pink); }

    .sub {
      font-size: 0.85rem; color: var(--muted);
      letter-spacing: 0.04em; margin-bottom: 1.7rem;
      font-weight: 300;
      animation: fadeDown 0.7s 0.48s ease both; opacity: 0;
    }
    .sub span { color: var(--pink2); }

    /* GIF frame */
    .gif-wrap {
      width: 100%; height: 170px;
      border-radius: 18px; overflow: hidden;
      background: var(--dark3);
      border: 1px solid var(--border);
      margin-bottom: 1.8rem;
      animation: fadeDown 0.7s 0.58s ease both; opacity: 0;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.4);
    }
    .gif-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: opacity 0.35s;
    }

    /* Buttons */
    .btns {
      display: flex; gap: 0.9rem;
      justify-content: center; align-items: center;
      flex-wrap: wrap;
      animation: fadeDown 0.7s 0.68s ease both; opacity: 0;
    }

    #btn-yes {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-style: italic; font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--pink), #c2185b);
      border: none; padding: 0.9rem 2.4rem;
      border-radius: 50px; cursor: pointer;
      box-shadow: 0 8px 28px rgba(255,61,127,0.45), 0 0 0 1px rgba(255,61,127,0.2);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
      letter-spacing: 0.02em;
    }
    #btn-yes:hover {
      transform: scale(1.08) translateY(-2px);
      box-shadow: 0 14px 36px rgba(255,61,127,0.6), 0 0 60px rgba(255,61,127,0.2);
    }

    #btn-no {
      font-size: 0.93rem; color: var(--muted);
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.1);
      padding: 0.88rem 1.8rem; border-radius: 50px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #btn-no:hover { border-color: var(--pink); color: var(--pink); }

    /* Toast */
    #toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--dark3);
      border: 1px solid var(--border);
      color: #fff;
      padding: 0.65rem 1.6rem; border-radius: 50px;
      font-size: 0.84rem; opacity: 0;
      z-index: 999; pointer-events: none;
      transition: all 0.45s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5), var(--glow);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Celebration */
    #celebration {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      opacity: 0; pointer-events: none;
    }
    #celebration.active {
      pointer-events: all;
      animation: celebFade 0.7s ease forwards;
    }
    @keyframes celebFade { to { opacity: 1; } }

    .celeb-bg {
      position: absolute; inset: 0; z-index: -1;
      background: linear-gradient(140deg, #1a0010 0%, #2d0020 40%, #0d0d0d 100%);
    }
    .celeb-glow {
      position: absolute; inset: 0; z-index: -1;
      background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(255,61,127,0.2) 0%, transparent 70%);
    }

    .c-emoji {
      font-size: 6rem; display: block;
      animation: pop 0.6s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
      filter: drop-shadow(0 0 30px rgba(255,61,127,0.6));
    }
    #celebration h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem; font-weight: 600;
      color: white; margin: 1.2rem 0 0.6rem;
      line-height: 1.2;
      text-shadow: 0 0 60px rgba(255,61,127,0.5);
      animation: pop 0.6s 0.38s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    #celebration h2 em { color: var(--pink); font-style: italic; }
    #celebration p {
      color: rgba(255,255,255,0.75); font-size: 1rem;
      max-width: 300px; line-height: 1.7; font-weight: 300;
      animation: pop 0.6s 0.52s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .c-note {
      margin-top: 1.4rem; font-size: 0.74rem;
      color: var(--pink2);
      letter-spacing: 0.12em; text-transform: uppercase;
      animation: pop 0.6s 0.66s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.5) translateY(20px); }
      to   { opacity: 1; transform: none; }
    }

    /* Confetti */
    .confetti {
      position: fixed; pointer-events: none; z-index: 300;
      animation: fall linear forwards;
    }
    @keyframes fall {
      from { opacity: 1; transform: translateY(-40px) rotate(0deg); }
      to   { opacity: 0; transform: translateY(108vh) rotate(720deg); }
    }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="grid-overlay"></div>
<div id="particles"></div>

<audio id="bgm" loop preload="auto">
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg" />
  <source src="https://assets.mixkit.co/music/preview/mixkit-serene-view-443.mp3" type="audio/mpeg" />
</audio>

<div class="card">

  <div class="music-pill">
    <button id="music-btn" onclick="toggleMusic()">▶</button>
    <span class="pill-label" id="pill-label">♪ Tap to play</span>
    <div class="bars paused" id="bars">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <span class="hero-emoji" id="hero-emoji">🖤</span>
  <h1>Do you miss me, <em>babe?</em></h1>
  <p class="sub">Jangan bohong ya... aku tau kok 👀 <span>♡</span></p>

  <div class="gif-wrap">
    <img id="gif" src="https://media.giphy.com/media/3o7TKSjRrfIPjeiVyM/giphy.gif" alt="cute gif" />
  </div>

  <div class="btns">
    <button id="btn-yes" onclick="sayYes()">Iya, kangen banget 💗</button>
    <button id="btn-no"  onclick="sayNo()">Enggak juga sih...</button>
  </div>
</div>

<div id="toast"></div>

<div id="celebration">
  <div class="celeb-bg"></div>
  <div class="celeb-glow"></div>
  <span class="c-emoji">🥰</span>
  <h2>Aku juga kangen<br/><em>banget</em>, babe!</h2>
  <p>Makasih udah jujur 🖤 Kamu selalu ada di pikiran aku, setiap saat ✨</p>
  <p class="c-note">♫ a song that plays whenever i think of you ♫</p>
</div>

<script>
  /* ── Particles ── */
  const emojiSet = ['🖤','💗','🌹','✨','💕','🥀','💞','🫧','💓'];
  const pLayer = document.getElementById('particles');
  for (let i = 0; i < 26; i++) {
    const d = document.createElement('div');
    d.className = 'p';
    d.textContent = emojiSet[i % emojiSet.length];
    d.style.cssText = `left:${Math.random()*100}%;font-size:${(.6+Math.random()*1.1).toFixed(2)}rem;animation-duration:${(9+Math.random()*11).toFixed(1)}s;animation-delay:${(Math.random()*14).toFixed(1)}s`;
    pLayer.appendChild(d);
  }

  /* ── Music ── */
  const bgm = document.getElementById('bgm');
  let playing = false;

  document.body.addEventListener('click', () => { if (!playing) startMusic(); }, { once: true });

  function startMusic() {
    bgm.volume = 0.38;
    bgm.play().then(() => {
      playing = true;
      document.getElementById('music-btn').textContent = '⏸';
      document.getElementById('pill-label').textContent = '♪ For you, babe';
      document.getElementById('bars').classList.remove('paused');
    }).catch(() => {});
  }

  function toggleMusic() {
    if (playing) {
      bgm.pause(); playing = false;
      document.getElementById('music-btn').textContent = '▶';
      document.getElementById('pill-label').textContent = '♪ Paused';
      document.getElementById('bars').classList.add('paused');
    } else { startMusic(); }
  }

  /* ── No button ── */
  let noCount = 0;
  const noLabels = [
    "Enggak juga sih...",
    "Hmm, mungkin dikit?",
    "Ya... mungkin iya",
    "Oke fine, iya deh",
    "Iya iya aku kangen!!",
    "KANGEN BANGET 😭💗",
  ];
  const toasts = [
    "Masa sih? Bohong kamu 🥺",
    "Aku ga percaya deh... 😢",
    "Hati kamu tau kebenarannya!",
    "Ngaku aja, jangan gengsi 😩",
    "Pasti kamu lagi mikirin aku 💭",
    "Plissss jujur dong 🫶",
    "Aku bisa ngerasain dari sini 💗",
    "Sekali lagi dan kamu bakal ngaku!",
  ];
  const gifs = [
    "https://media.giphy.com/media/3o7TKSjRrfIPjeiVyM/giphy.gif",
    "https://media.giphy.com/media/d2lcHJTG5Tscg/giphy.gif",
    "https://media.giphy.com/media/hHxTQkcjmHUTC/giphy.gif",
    "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif",
    "https://media.giphy.com/media/26ufcVAp3AiJJsrIs/giphy.gif",
  ];
  const emojiSeq = ['🖤','😢','😭','💔','😩','🫶','🥹'];

  function sayNo() {
    noCount++;

    if (noCount >= 6) {
      const nb = document.getElementById('btn-no');
      nb.textContent = 'KANGEN BANGET 😭💗';
      nb.style.borderColor = 'var(--pink)';
      nb.style.color = 'var(--pink)';
      nb.style.transform = '';
      setTimeout(sayYes, 700);
      return;
    }

    document.getElementById('btn-no').textContent = noLabels[Math.min(noCount, noLabels.length-1)];

    // Grow Yes button
    const byBtn = document.getElementById('btn-yes');
    const s = Math.min(1 + noCount * 0.18, 2.2);
    byBtn.style.transform = `scale(${s})`;
    byBtn.style.boxShadow = `0 ${8+noCount*3}px ${28+noCount*8}px rgba(255,61,127,${Math.min(.45+noCount*.07,.8)}), 0 0 ${20+noCount*10}px rgba(255,61,127,${Math.min(.2+noCount*.05,.5)})`;

    // Change emoji
    document.getElementById('hero-emoji').textContent = emojiSeq[Math.min(noCount, emojiSeq.length-1)];

    // Swap gif
    const gifEl = document.getElementById('gif');
    gifEl.style.opacity = '0';
    setTimeout(() => {
      gifEl.src = gifs[Math.min(noCount, gifs.length-1)] + '?r=' + Date.now();
      gifEl.style.opacity = '1';
    }, 350);

    showToast(toasts[Math.min(noCount-1, toasts.length-1)]);
    wiggleNo();
  }

  function wiggleNo() {
    const el = document.getElementById('btn-no');
    const dx = (Math.random()-.5)*180, dy = (Math.random()-.5)*120;
    el.style.transition = 'transform .3s cubic-bezier(.34,1.56,.64,1)';
    el.style.transform = `translate(${dx}px,${dy}px)`;
    setTimeout(() => {
      el.style.transition = 'transform .5s cubic-bezier(.34,1.56,.64,1)';
      el.style.transform = '';
    }, 460);
  }

  /* ── Toast ── */
  let tTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(tTimer);
    tTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  /* ── Yes! ── */
  function sayYes() {
    if (!playing) startMusic();
    for (let i = 0; i < 50; i++) setTimeout(spawnConfetti, i * 60);
    setTimeout(() => document.getElementById('celebration').classList.add('active'), 280);
  }

  function spawnConfetti() {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = emojiSet[Math.floor(Math.random()*emojiSet.length)];
    el.style.cssText = `left:${Math.random()*100}vw;font-size:${(.9+Math.random()*1.6).toFixed(2)}rem;animation-duration:${(1.4+Math.random()*2.2).toFixed(2)}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
</script>
</body>
</html>
